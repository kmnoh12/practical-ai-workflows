<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">I stopped asking AI to summarize lectures</title>
  <desc id="desc">A six-course case study: 24 reassembled study documents and 103 source-locked inputs.</desc>
  <rect width="1200" height="630" fill="#f4efe5"/>
  <path d="M0 515 C210 445 355 585 590 515 C815 448 985 560 1200 480 L1200 630 L0 630 Z" fill="#e6dcc8"/>
  <line x1="67" y1="74" x2="1133" y2="74" stroke="#14243a" stroke-width="2"/>
  <text x="70" y="53" fill="#14243a" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2.2">PRACTICAL AI WORKFLOWS  /  FIELD NOTE 07</text>

  <text x="68" y="153" fill="#14243a" font-family="Georgia, serif" font-size="57" font-weight="700">I stopped asking AI</text>
  <text x="68" y="220" fill="#14243a" font-family="Georgia, serif" font-size="57" font-weight="700">to summarize lectures.</text>
  <text x="72" y="267" fill="#566273" font-family="Arial, Helvetica, sans-serif" font-size="22">The clean summary was the wrong study interface.</text>

  <g transform="translate(805 113)">
    <rect width="328" height="178" rx="18" fill="#14243a"/>
    <text x="28" y="42" fill="#e2a93b" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.6">RECORDED RUN</text>
    <text x="28" y="90" fill="#f4efe5" font-family="Georgia, serif" font-size="34" font-weight="700">6 courses</text>
    <text x="28" y="128" fill="#f4efe5" font-family="Georgia, serif" font-size="34" font-weight="700">24 study docs</text>
    <text x="28" y="158" fill="#cbd3d7" font-family="Arial, Helvetica, sans-serif" font-size="17">103 selected sources ready</text>
  </g>

  <text x="70" y="344" fill="#14243a" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.7">THE REPLACEMENT PIPELINE</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(69 369)">
      <rect width="190" height="96" rx="13" fill="#d85c41"/>
      <text x="20" y="38" fill="#fff" font-size="15" font-weight="700">01  LOCK SOURCES</text>
      <text x="20" y="66" fill="#fff" font-size="16">audio · PDF · scope</text>
    </g>
    <g transform="translate(285 369)">
      <rect width="190" height="96" rx="13" fill="#3f7890"/>
      <text x="20" y="38" fill="#fff" font-size="15" font-weight="700">02  ALIGN PDF</text>
      <text x="20" y="66" fill="#fff" font-size="16">figures · conditions</text>
    </g>
    <g transform="translate(501 369)">
      <rect width="190" height="96" rx="13" fill="#556b52"/>
      <text x="20" y="38" fill="#fff" font-size="15" font-weight="700">03  CHECK CLAIMS</text>
      <text x="20" y="66" fill="#fff" font-size="16">signals · confidence</text>
    </g>
    <g transform="translate(717 369)">
      <rect width="190" height="96" rx="13" fill="#7b5b8d"/>
      <text x="20" y="38" fill="#fff" font-size="15" font-weight="700">04  BUILD RECALL</text>
      <text x="20" y="66" fill="#fff" font-size="16">traps · source cues</text>
    </g>
    <g transform="translate(933 369)">
      <rect width="198" height="96" rx="13" fill="#14243a"/>
      <text x="20" y="38" fill="#fff" font-size="15" font-weight="700">05  SCOPE DECK</text>
      <text x="20" y="66" fill="#fff" font-size="16">NotebookLM · QA</text>
    </g>
  </g>

  <text x="70" y="574" fill="#14243a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Source scope → checkable claim → retrieval prompt → scoped deck</text>
  <text x="1132" y="574" text-anchor="end" fill="#566273" font-family="Arial, Helvetica, sans-serif" font-size="15">practical-ai-workflows.pages.dev</text>
</svg>
